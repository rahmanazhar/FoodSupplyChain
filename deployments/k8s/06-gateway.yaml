apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: foodsupplychain
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: foodsupplychain-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: INVENTORY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: supplychain-config
                  key: INVENTORY_SERVICE_URL
            - name: SHIPMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: supplychain-config
                  key: SHIPMENT_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: foodsupplychain
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
