apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: foodsupplychain
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
      annotations:
        # The service exposes Prometheus metrics on GET /metrics (port 8080).
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inventory-service
          image: foodsupplychain-inventory:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: supplychain-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supplychain-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supplychain-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: foodsupplychain
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8080
      targetPort: 8080
